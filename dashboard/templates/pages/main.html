{% extends "base.html" %}
{% block title %}Case Locations{% endblock %}

{% block content %}
<div x-data="{ activeFilter: null, selectedLocation: '', selectedCategory: '', selectedShipDate: '' }">

  <!-- Filter Bar -->
  <div class="page-header">
    <div class="filter-bar">
      <button class="btn btn-rush"
              :class="{ active: activeFilter === 'rush' }"
              @click="activeFilter = activeFilter === 'rush' ? null : 'rush'; $nextTick(() => { htmx.trigger('#case-table-content', 'filter-changed'); htmx.trigger('#location-grid', 'filter-changed'); })"
              >
        Rush
      </button>
      <button class="btn btn-overdue"
              :class="{ active: activeFilter === 'overdue' }"
              @click="activeFilter = activeFilter === 'overdue' ? null : 'overdue'; $nextTick(() => { htmx.trigger('#case-table-content', 'filter-changed'); htmx.trigger('#location-grid', 'filter-changed'); })"
              >
        Overdue
      </button>
      <button class="btn btn-leaves"
              :class="{ active: activeFilter === 'leaves_today' }"
              @click="activeFilter = activeFilter === 'leaves_today' ? null : 'leaves_today'; $nextTick(() => { htmx.trigger('#case-table-content', 'filter-changed'); htmx.trigger('#location-grid', 'filter-changed'); })"
              >
        Leaves Today
      </button>
      <button class="btn btn-view-all"
              :class="{ active: activeFilter === null }"
              @click="activeFilter = null; $nextTick(() => { htmx.trigger('#case-table-content', 'filter-changed'); htmx.trigger('#location-grid', 'filter-changed'); })"
              >
        View All
      </button>

      <span style="display:inline-block; width:1px; height:28px; background:#e53935; margin:0 12px; vertical-align:middle;"></span>

      <select class="filter-select" style="height:36px; vertical-align:middle;"
              x-model="selectedCategory"
              @change="$nextTick(() => { htmx.trigger('#case-table-content', 'filter-changed'); htmx.trigger('#location-grid', 'filter-changed'); })">
        <option value="">All Categories</option>
        {% for cat in all_categories %}
        <option value="{{ cat }}">{{ cat }}</option>
        {% endfor %}
      </select>

      <span style="display:inline-block; width:1px; height:28px; background:#e53935; margin:0 12px; vertical-align:middle;"></span>

      <select class="filter-select" style="height:36px; vertical-align:middle;"
              x-model="selectedLocation"
              @change="$nextTick(() => { htmx.trigger('#case-table-content', 'filter-changed'); htmx.trigger('#location-grid', 'filter-changed'); })">
        <option value="">All Locations</option>
        {% for loc in all_locations %}
        <option value="{{ loc }}">{{ loc }}</option>
        {% endfor %}
      </select>

      <span style="display:inline-block; width:1px; height:28px; background:#e53935; margin:0 12px; vertical-align:middle;"></span>

      <select class="filter-select" style="height:36px; vertical-align:middle;"
              x-model="selectedShipDate"
              @change="$nextTick(() => { htmx.trigger('#case-table-content', 'filter-changed'); htmx.trigger('#location-grid', 'filter-changed'); })">
        <option value="">All Ship Dates</option>
        {% for sd in all_ship_dates %}
        <option value="{{ sd }}">{{ sd }}</option>
        {% endfor %}
      </select>

      <button class="btn btn-reset"
              x-show="activeFilter || selectedCategory || selectedLocation || selectedShipDate"
              x-transition
              @click="activeFilter = null; selectedCategory = ''; selectedLocation = ''; selectedShipDate = ''; document.querySelector('[name=search]').value = ''; $nextTick(() => { htmx.trigger('#case-table-content', 'filter-changed'); htmx.trigger('#location-grid', 'filter-changed'); })">
        Reset Filters
      </button>
    </div>
    <div class="total-badge"
         hx-get="/partials/total-cases-badge"
         hx-trigger="sse:data-refreshed, filter-changed from:body"
         hx-include="[name='filter'],[name='location'],[name='category'],[name='ship_date']"
         hx-swap="innerHTML">
      <span class="total-badge-count">{{ total_cases }}</span>
      <span class="total-badge-label">Total Cases</span>
    </div>
  </div>

  <!-- Split Layout -->
  <div class="split-layout">
    <!-- Left: Location Grid -->
    <div class="split-left">
      <div id="location-grid"
           hx-get="/partials/location-grid"
           hx-trigger="sse:data-refreshed, filter-changed"
           hx-include="[name='filter'],[name='location'],[name='category'],[name='ship_date']"
           hx-swap="innerHTML">
        {% include "partials/location_grid.html" %}
      </div>
    </div>

    <!-- Right: Data Table -->
    <div class="split-right">
      <div class="table-container">
        <div class="table-header-bar">
          <input type="search" class="search-input" placeholder="Case #"
                 name="search"
                 hx-get="/partials/case-table"
                 hx-trigger="keyup changed delay:300ms"
                 hx-target="#case-table-content"
                 hx-include="[name='filter'],[name='location'],[name='category'],[name='ship_date']">
          <a class="btn btn-view-all hide-on-mobile"
             :href="'/partials/export-csv?' + new URLSearchParams({filter: activeFilter || '', search: document.querySelector('[name=search]')?.value || '', location: selectedLocation || '', category: selectedCategory || '', ship_date: selectedShipDate || ''}).toString()"
             download="case_locations.csv"
             style="text-decoration:none; vertical-align:middle;">
            Export CSV
          </a>
          <button class="btn btn-view-all hide-on-mobile" @click="exportTilesPDF()" style="vertical-align:middle;">
            Export PDF
          </button>
          <input type="hidden" name="filter" :value="activeFilter || ''">
          <input type="hidden" name="category" :value="selectedCategory || ''">
          <input type="hidden" name="location" :value="selectedLocation || ''">
          <input type="hidden" name="ship_date" :value="selectedShipDate || ''">
        </div>

        <div id="case-table-content"
             hx-get="/partials/case-table"
             hx-trigger="sse:data-refreshed, filter-changed"
             hx-include="[name='filter'],[name='search'],[name='location'],[name='category'],[name='ship_date']"
             hx-swap="innerHTML">
          {% include "partials/case_table.html" %}
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function exportTilesPDF() {
  // Collect filters
  var filters = [];
  var alpineData = Alpine.$data(document.querySelector('[x-data]'));
  if (alpineData.activeFilter) {
    var labels = {rush: 'Rush', overdue: 'Overdue', leaves_today: 'Leaves Today'};
    filters.push(labels[alpineData.activeFilter] || alpineData.activeFilter);
  }
  if (alpineData.selectedCategory) filters.push('Category: ' + alpineData.selectedCategory);
  if (alpineData.selectedLocation) filters.push('Location: ' + alpineData.selectedLocation);
  if (alpineData.selectedShipDate) filters.push('Ship Date: ' + alpineData.selectedShipDate);
  var filterText = filters.length ? filters.join('  |  ') : 'All Cases';

  // Date + time
  var now = new Date();
  var dateStr = now.toLocaleDateString('en-US', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
  var timeStr = now.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit', hour12:true});

  // Total cases count from DOM badge
  var totalCasesEl = document.querySelector('.total-badge-count');
  var totalCases = totalCasesEl ? totalCasesEl.textContent.trim() : '';

  // Preload logo
  var logoImg = new Image();
  logoImg.onload = logoImg.onerror = doExport;
  logoImg.src = '/static/logo.png';

  function doExport() {
    // Layout constants (logical pixels at 1x; canvas is drawn at SCALE×)
    var SCALE    = 2;
    var PAGE_W   = 1050;
    var PAD      = 24;
    var COL_W    = 105;
    var GAP      = 12;
    var COLS     = Math.floor((PAGE_W - PAD * 2 + GAP) / (COL_W + GAP)); // 8
    var DS       = 60;   // donut size
    var CARD_PAD = 12;
    var DOT_H    = 14;
    var MAX_DOTS = 6;
    var CARD_H   = CARD_PAD + DS + 8 + 20 + 6 + MAX_DOTS * DOT_H + CARD_PAD; // 202px

    // Read card data directly from live DOM — no cloning, no html2canvas
    var cards = Array.from(
      document.getElementById('location-grid').querySelectorAll('.location-card')
    );

    var ROWS     = Math.ceil(cards.length / COLS);
    var HDR_H    = 100;
    var CANVAS_H = HDR_H + PAD + ROWS * (CARD_H + GAP) + PAD;

    // Create canvas
    var c   = document.createElement('canvas');
    c.width  = PAGE_W  * SCALE;
    c.height = CANVAS_H * SCALE;
    var ctx  = c.getContext('2d');
    ctx.scale(SCALE, SCALE);

    // White background
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, PAGE_W, CANVAS_H);

    var y = PAD;

    // Logo
    if (logoImg.naturalWidth && logoImg.naturalHeight) {
      var logoH = 44;
      var logoW = logoImg.naturalWidth * logoH / logoImg.naturalHeight;
      ctx.drawImage(logoImg, PAD, y, logoW, logoH);
      y += logoH + 8;
    }

    // Total cases — top right (mirrors on-screen badge)
    if (totalCases) {
      ctx.textAlign    = 'right';
      ctx.textBaseline = 'top';
      ctx.font         = 'bold 32px sans-serif';
      ctx.fillStyle    = '#C62828';
      ctx.fillText(totalCases, PAGE_W - PAD, PAD);
      ctx.font         = 'bold 13px sans-serif';
      ctx.fillText('TOTAL CASES', PAGE_W - PAD, PAD + 36);
      ctx.textAlign    = 'left';
    }

    // Date/time
    ctx.font         = '13px sans-serif';
    ctx.fillStyle    = '#666666';
    ctx.textBaseline = 'top';
    ctx.fillText(dateStr + '  \u2014  ' + timeStr, PAD, y);
    y += 20;

    // Filter line text
    ctx.font      = 'bold 14px sans-serif';
    ctx.fillStyle = '#333333';
    ctx.fillText('Filters: ' + filterText, PAD, y);
    y += 20;

    // Red rule
    ctx.strokeStyle = '#C0182B';
    ctx.lineWidth   = 2;
    ctx.beginPath();
    ctx.moveTo(PAD, y); ctx.lineTo(PAGE_W - PAD, y);
    ctx.stroke();
    y += PAD;

    // Draw each card
    cards.forEach(function(card, i) {
      var col = i % COLS;
      var row = Math.floor(i / COLS);
      var cx  = PAD + col * (COL_W + GAP);
      var cy  = y + row * (CARD_H + GAP);

      // Card background
      ctx.fillStyle   = '#ffffff';
      ctx.strokeStyle = '#E5E5E5';
      ctx.lineWidth   = 1;
      roundRect(ctx, cx, cy, COL_W, CARD_H, 8);
      ctx.fill(); ctx.stroke();

      // Donut
      var donutEl = card.querySelector('.donut');
      if (donutEl) {
        var segsAttr   = donutEl.getAttribute('data-segments');
        var segments   = segsAttr ? JSON.parse(segsAttr) : [];
        var total      = parseInt(donutEl.getAttribute('data-total') || '0', 10);
        var statusColor= donutEl.getAttribute('data-status-color') || '#27AE60';
        var donutC     = drawDonutCanvas(segments, total, statusColor);
        var dx = cx + (COL_W - DS) / 2;
        var dy = cy + CARD_PAD;
        // Status ring
        ctx.beginPath();
        ctx.arc(dx + DS/2, dy + DS/2, DS/2 + 2, 0, Math.PI * 2);
        ctx.strokeStyle = statusColor;
        ctx.lineWidth   = 3;
        ctx.stroke();
        ctx.drawImage(donutC, dx, dy, DS, DS);
      }

      // Location name
      var nameEl = card.querySelector('.location-name');
      var nameText = nameEl ? nameEl.textContent.trim() : '';
      if (nameText.length > 18) nameText = nameText.substring(0, 17) + '\u2026';
      ctx.font      = 'bold 11px sans-serif';
      ctx.fillStyle = '#1A1A1A';
      ctx.textAlign = 'center';
      ctx.fillText(nameText, cx + COL_W / 2, cy + CARD_PAD + DS + 10);

      // Category dots
      var dots = Array.from(card.querySelectorAll('.cat-dot')).slice(0, MAX_DOTS);
      var dotY0 = cy + CARD_PAD + DS + 10 + 16;
      dots.forEach(function(dot, di) {
        var dy2      = dotY0 + di * DOT_H;
        var colorEl  = dot.querySelector('.cat-dot-color');
        var dotColor = colorEl ? colorEl.style.background : '#B0BEC5';
        ctx.beginPath();
        ctx.arc(cx + 10, dy2 + 4, 3.5, 0, Math.PI * 2);
        ctx.fillStyle = dotColor;
        ctx.fill();
        var txt = dot.textContent.trim();
        if (txt.length > 20) txt = txt.substring(0, 19) + '\u2026';
        ctx.font         = '9px sans-serif';
        ctx.fillStyle    = '#6B6B6B';
        ctx.textAlign    = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillText(txt, cx + 18, dy2 + 4);
        ctx.textBaseline = 'top';
      });

      ctx.textAlign = 'left';
    });

    // Build PDF — slice canvas at row boundaries (3 rows per page) to avoid card cutoffs
    var jsPDF        = window.jspdf.jsPDF;
    var pdf          = new jsPDF({orientation: 'landscape', unit: 'mm', format: 'letter'});
    var margin       = 8;
    var contentW     = pdf.internal.pageSize.getWidth() - margin * 2;
    var ROWS_PER_PAGE = 3;

    // Page split points in logical canvas pixels
    var splits = [0];
    for (var r = ROWS_PER_PAGE; r < ROWS; r += ROWS_PER_PAGE) {
      splits.push(HDR_H + PAD + r * (CARD_H + GAP));
    }
    splits.push(CANVAS_H);

    for (var p = 0; p < splits.length - 1; p++) {
      if (p > 0) pdf.addPage();
      var srcY = splits[p];
      var srcH = splits[p + 1] - srcY;

      // Clip this page's slice from the main canvas
      var pc = document.createElement('canvas');
      pc.width  = c.width;
      pc.height = srcH * SCALE;
      pc.getContext('2d').drawImage(c, 0, srcY * SCALE, c.width, srcH * SCALE, 0, 0, c.width, srcH * SCALE);

      var pdfH = srcH / PAGE_W * contentW;
      pdf.addImage(pc.toDataURL('image/png'), 'PNG', margin, margin, contentW, pdfH);
    }
    pdf.save('case_locations_tiles.pdf');
  }
}

function drawDonutCanvas(segments, total, statusColor) {
  var SIZE = 80;
  var OUTER_R = 37;
  var INNER_R = 27;
  var canvas = document.createElement('canvas');
  canvas.width = SIZE;
  canvas.height = SIZE;
  canvas.style.cssText = 'width:' + SIZE + 'px; height:' + SIZE + 'px; border-radius:50%; box-shadow:0 0 0 3px ' + statusColor + '; margin:0 auto 8px; display:block;';
  var ctx = canvas.getContext('2d');
  var cx = SIZE / 2, cy = SIZE / 2;

  if (!segments || segments.length === 0) {
    ctx.beginPath();
    ctx.arc(cx, cy, OUTER_R, 0, Math.PI * 2);
    ctx.fillStyle = '#D5D8DC';
    ctx.fill();
  } else {
    var startAngle = -Math.PI / 2;
    segments.forEach(function(seg) {
      var endAngle = startAngle + (seg.deg * Math.PI / 180);
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, OUTER_R, startAngle, endAngle);
      ctx.closePath();
      ctx.fillStyle = seg.color;
      ctx.fill();
      startAngle = endAngle;
    });
  }

  // White donut hole
  ctx.beginPath();
  ctx.arc(cx, cy, INNER_R, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();

  // Count text
  var fontSize = total > 99 ? 13 : total > 9 ? 17 : 21;
  ctx.fillStyle = '#1A1A1A';
  ctx.font = 'bold ' + fontSize + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(total.toString(), cx, cy);

  return canvas;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}
</script>
{% endblock %}
